# =============================================================================
# MirrorMaker 2 Configuration
# Replicates commit-log from Primary cluster → Standby cluster
# =============================================================================

# --- Cluster aliases ---
clusters = primary, standby

# --- Primary cluster connection ---
primary.bootstrap.servers = primary-kafka:29092

# --- Standby cluster connection ---
standby.bootstrap.servers = standby-kafka:29092

# --- Replication flows ---
primary->standby.enabled = true

# --- Topic whitelist ---
primary->standby.topics = commit-log

# --- Consumer group sync ---
primary->standby.sync.group.offsets.enabled = true
primary->standby.sync.group.offsets.interval.seconds = 5

# --- Replication factor on the DR side ---
replication.factor = 1

# --- Connector settings ---
tasks.max = 1

# --- Checkpoint/offset sync ---
checkpoints.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1

# --- Connect storage replication factors (for single-node testing) ---
offset.storage.replication.factor = 1
config.storage.replication.factor = 1
status.storage.replication.factor = 1
primary.offset.storage.replication.factor = 1
primary.config.storage.replication.factor = 1
primary.status.storage.replication.factor = 1
standby.offset.storage.replication.factor = 1
standby.config.storage.replication.factor = 1
standby.status.storage.replication.factor = 1

# --- Disable reverse replication flow ---
standby->primary.enabled = false

# --- Consumer group for the MirrorSourceTask ---
primary->standby.consumer.group.id = mirrormaker2-replication-group

# --- Auto offset reset ---
primary->standby.consumer.auto.offset.reset = earliest

# --- Topic discovery and sync intervals ---
refresh.topics.interval.seconds = 10
refresh.groups.interval.seconds = 10
sync.topic.configs.enabled = true

